project-aegis-rag:
  - .env
  - .gitignore
  - README.md
  - requirements.txt

config:
  - __init__.py
  - settings.py
  prompts:
    - metadata_extraction.yaml
    - query_expansion.yaml
    - hyde_prompt.yaml
    - system_prompts.yaml

data:
  raw:
    security:
      - "*.txt"                  # e.g., access_control.txt, data_privacy.txt
    training:
      - "*.txt"                  # e.g., mandatory_training.txt
    travel:
      - "*.txt"                  # e.g., international_travel.txt
    work_policies:
      - "*.txt"                  # e.g., remote_work.txt, leave_policy.txt

src:
  - __init__.py
  ingestion:
    - __init__.py
    - chunker.py
    - metadata_extractor.py
    - embedder.py
    - pipeline.py
  retrieval:
    - __init__.py
    - query_transformer.py
    - metadata_filter.py
    - retriever.py
    - reranker.py
    - pipeline.py
  core:
    - __init__.py
    - llm_client.py
    - vector_store.py
    - utils.py
  models:
    - __init__.py
    - schemas.py

app:
  - __init__.py
  - streamlit_app.py
  components:
    - chat.py
    - sidebar.py
    - results.py
  utils:
    - streamlit_helpers.py

scripts:
  - run_ingestion.py
  - test_retrieval.py
  - evaluate_rag.py

notebooks:
  - 01_chunking_test.ipynb
  - 02_retrieval_debug.ipynb

tests:
  - test_chunker.py
  - test_metadata.py
  - test_retrieval.py

.vscode:
  - settings.json
  - launch.json
        EOF
        
        python generator.py
