name: Setup Project Structure
on:
  workflow_dispatch: # Allows you to run this manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Generate Structure  
        run: |
          cat << 'EOF' > generator.py
          import yaml
          import os

          def create_structure(base_path, structure):
              if isinstance(structure, list):
                  for item in structure:
                      # Create empty files
                      file_path = os.path.join(base_path, item.replace("*", "placeholder"))
                      os.makedirs(os.path.dirname(file_path), exist_ok=True)
                      with open(file_path, 'a'):
                          os.utime(file_path, None)
              elif isinstance(structure, dict):
                  for key, value in structure.items():
                      new_path = os.path.join(base_path, key)
                      if isinstance(value, (dict, list)) and value:
                          os.makedirs(new_path, exist_ok=True)
                          create_structure(new_path, value)
                      elif isinstance(value, str):
                          # Handle direct file paths
                          os.makedirs(os.path.dirname(new_path), exist_ok=True)
                          with open(new_path, 'a'):
                              os.utime(new_path, None)

          if os.path.exists('structure.yaml'):
              with open('structure.yaml', 'r') as f:
                  data = yaml.safe_load(f)
                  if data:
                      create_structure('.', data)
          EOF
          
          cat << 'EOF' > structure.yaml
          project-aegis-rag:
            - .env
            - .gitignore
            - README.md
            - requirements.txt
          config:
            - __init__.py
            - settings.py
          config/prompts:
            - metadata_extraction.yaml
            - query_expansion.yaml
            - hyde_prompt.yaml
            - system_prompts.yaml
          data/raw/security:
            - access_control.txt
            - data_privacy.txt
          data/raw/training:
            - mandatory_training.txt
          data/raw/travel:
            - international_travel.txt
          data/raw/work_policies:
            - remote_work.txt
            - leave_policy.txt
          src:
            - __init__.py
          src/ingestion:
            - __init__.py
            - chunker.py
            - metadata_extractor.py
            - embedder.py
            - pipeline.py
          src/retrieval:
            - __init__.py
            - query_transformer.py
            - metadata_filter.py
            - retriever.py
            - reranker.py
            - pipeline.py
          src/core:
            - __init__.py
            - llm_client.py
            - vector_store.py
            - utils.py
          src/models:
            - __init__.py
            - schemas.py
          app:
            - __init__.py
            - streamlit_app.py
          app/components:
            - chat.py
            - sidebar.py
            - results.py
          app/utils:
            - streamlit_helpers.py
          scripts:
            - run_ingestion.py
            - test_retrieval.py
            - evaluate_rag.py
          notebooks:
            - 01_chunking_test.ipynb
            - 02_retrieval_debug.ipynb
          tests:
            - test_chunker.py
            - test_metadata.py
            - test_retrieval.py
          .vscode:
            - settings.json
            - launch.json
          EOF
          
          python generator.py
